baseURL = 'https://kalpitborkar.github.io/'
languageCode = 'en-us'
title = 'Kalpit Borkar | Research Scientist'
theme = 'PaperMod'
paginate = 10

[params]
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  description = "Kalpit Borkar is a research scientist working on fundamental machine learning problems in image forensics and AI safety."
  author = "Kalpit Borkar"
  
  # Enabling Profile Mode for a clean, resume-style landing page
  [params.profileMode]
    enabled = true
    title = "Hi, I'm Kalpit"
    subtitle = "Research Scientist @ Contrails.ai \n\nWorking on fundamental machine learning problems in image forensics and AI safety. \n\nReach out at kalpit@contrails.ai"
    
    imageUrl = "/pfp.png" 
    imageWidth = 224      
    imageHeight = 224   
    imageTitle = "Kalpit Borkar Profile" 

    # Call-to-action buttons on the homepage
    [[params.profileMode.buttons]]
      name = "Read my posts"
      url = "/posts/"
      
    [[params.profileMode.buttons]]
      name = "Contact me"
      url = "mailto:kalpit@contrails.ai"

  # Social icons displayed below your profile text
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/kalpitborkar"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/kalpitborkar" 

  [[params.socialIcons]]
    name = "email"
    url = "mailto:kalpit@contrails.ai"

# Top navigation menu
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/" 
    weight = 20